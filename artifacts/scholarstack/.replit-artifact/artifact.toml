kind = "web"
previewPath = "/scholarstack/"
title = "ScholarStack"
version = "1.0.0"
id = "artifacts/scholarstack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/scholarstack/" ]
localPort = 22379

[services.development]
run = "pnpm --filter @workspace/scholarstack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scholarstack", "run", "build" ]
publicDir = "artifacts/scholarstack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22379"
BASE_PATH = "/scholarstack/"
